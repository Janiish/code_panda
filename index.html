<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AgriChain ZK — Blockchain-powered farm-to-fork traceability platform for Indian agriculture">
  <meta name="theme-color" content="#0A0E17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AgriChain ZK — Farm to Fork Traceability</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- QR Code Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/screens.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
  <!-- Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- App Container -->
  <div id="app">

    <!-- ====== SPLASH SCREEN ====== -->
    <div id="screen-splash" class="screen splash-screen active">
      <div class="splash-particles" id="splash-particles"></div>
      <div class="splash-logo-container">
        <div class="splash-icon pulse-ring">🌾</div>
        <div class="splash-title shimmer-text">AgriChain ZK</div>
        <div class="splash-tagline">Farm to Fork · Verified on Chain</div>
        <div class="loading-dots" style="margin-top:24px">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- ====== LOGIN / ROLE SELECT ====== -->
    <div id="screen-login" class="screen login-screen">
      <div class="login-header fade-slide-up">
        <div style="font-size:40px;margin-bottom:12px">🌾</div>
        <h1>AgriChain <span class="text-green">ZK</span></h1>
        <p>Select your role to continue</p>
      </div>
      <div class="lang-toggle flex justify-center fade-slide-up" style="animation-delay:100ms">
        <button class="lang-btn active">English</button>
        <button class="lang-btn">हिंदी</button>
        <button class="lang-btn">ଓଡ଼ିଆ</button>
      </div>
      <div id="role-grid" class="role-grid stagger-children"></div>
    </div>

    <!-- ====== FARMER DASHBOARD ====== -->
    <div id="screen-farmer" class="screen screen-with-nav">
      <header class="app-header">
        <div class="header-left">
          <span class="font-display weight-bold text-lg">🌾 AgriChain</span>
        </div>
        <div class="header-right">
          <button class="btn-icon btn-secondary notification-dot" style="font-size:18px" onclick="showNotifications()">🔔</button>
        </div>
      </header>
      <div id="farmer-content" class="dashboard-content"></div>
    </div>

    <!-- ====== AGGREGATOR DASHBOARD ====== -->
    <div id="screen-aggregator" class="screen screen-with-nav">
      <header class="app-header">
        <div class="header-left">
          <span class="font-display weight-bold text-lg">📦 AgriChain</span>
        </div>
        <div class="header-right">
          <button class="btn-icon btn-secondary" style="font-size:18px" onclick="showNotifications()">🔔</button>
        </div>
      </header>
      <div id="aggregator-content" class="dashboard-content"></div>
    </div>

    <!-- ====== RETAILER DASHBOARD ====== -->
    <div id="screen-retailer" class="screen screen-with-nav">
      <header class="app-header">
        <div class="header-left">
          <span class="font-display weight-bold text-lg">🏪 AgriChain</span>
        </div>
        <div class="header-right">
          <button class="btn-icon btn-secondary" style="font-size:18px" onclick="showNotifications()">🔔</button>
        </div>
      </header>
      <div id="retailer-content" class="dashboard-content"></div>
    </div>

    <!-- ====== CONSUMER TRACE ====== -->
    <div id="screen-consumer" class="screen screen-with-nav">
      <header class="app-header">
        <div class="header-left">
          <span class="font-display weight-bold text-lg">📱 AgriTrace</span>
        </div>
        <div class="header-right">
          <button class="btn-icon btn-secondary" style="font-size:18px" onclick="showNotifications()">🔔</button>
        </div>
      </header>
      <div id="consumer-content" class="dashboard-content"></div>
    </div>

    <!-- ====== BOTTOM NAV ====== -->
    <nav id="bottom-nav" class="bottom-nav" style="display:none"></nav>

    <!-- ====== MODAL ====== -->
    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('active')">
      <div id="modal-content" class="modal-sheet"></div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/blockchain.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
